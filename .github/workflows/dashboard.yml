name: Rebuild Dashboard

on:
  push:
    paths:
      - 'results/candidates.tsv'
      - 'results/open_questions.jsonl'
      - 'dashboard.py'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy pyyaml matplotlib

      - name: Regenerate dashboard HTML
        run: python dashboard.py --out results/dashboard.html

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/dashboard.html
          git diff --staged --quiet || git commit -m "chore: rebuild dashboard [skip ci]"
          git push

  deploy-pages:
    needs: build-dashboard
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main   # pick up the just-committed dashboard.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp results/dashboard.html _site/index.html
          cp results/candidates.tsv _site/candidates.tsv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
