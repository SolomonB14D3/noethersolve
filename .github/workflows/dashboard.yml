name: Rebuild Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'results/candidates.tsv'
      - 'results/open_questions.jsonl'
      - 'dashboard.py'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy pyyaml matplotlib

      - name: Regenerate dashboard HTML
        run: python dashboard.py --out results/dashboard.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp results/dashboard.html _site/index.html
          cp results/candidates.tsv _site/candidates.tsv

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
