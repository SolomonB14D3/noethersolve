  - "Measure gender wage gap persistence: female servers earning 60-70% of male server equivalents in tip-dependent sectors"
  - "Model the feedback loop: low minimum wages → tipping culture strengthens → employers reduce base wages further"
  - "Test algorithmic tipping: when payment systems suggest percentages (15%, 18%, 22%), how does baseline psychology change?"

