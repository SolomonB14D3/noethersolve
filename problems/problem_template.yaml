# NoetherSolve — Problem Template
# Copy this file, fill in the fields, and run:
#   python oracle_wrapper.py --problem problems/your_problem.yaml --repair
#
# Three files per domain:
#   1. your_problem.yaml        — this file (problem definition)
#   2. your_problem_facts.json  — verification set (8-15 facts)
#   3. your_problem_checker.py  — numerical integrator (optional, for auto sweep)
#
# NOTE: Use flat keys (no "problem:" wrapper). See vortex_pair_conservation.yaml
# for a working example.

name: "describe_what_youre_looking_for"   # e.g. "3body_conservation_law"
description: |
  One paragraph: what unsolved or partially-solved structure you're hunting.
  What would a correct answer look like? What domain does it live in?

# Model to use as the oracle base
model: "Qwen/Qwen3-14B-Base"              # or Qwen2.5-1.5B for faster iteration

# Oracle method (always stem_margin for now)
oracle: "stem_margin"

# Path to verification set JSON (relative to this file)
# Format: {"facts": [{"context": ..., "truth": ..., "distractors": [...]}]}
verification_set: "your_problem_facts.json"

# Fraction of verification facts that must have positive margin to pass
pass_threshold: 0.8

# Monitors (optional)
monitors:
  - margin_sign                        # always required (oracle log-prob filter)
  # - energy_violation                 # |E(t)-E(0)|/|E(0)| — integrator sanity

# Adapter for repair pass (null = use default)
adapter: null

# Reward function configuration (optional — controls autonomous loop)
reward:
  primary: margin_after_repair
  secondary: frac_var
  knowledge_gap_trigger: -5.0

# Compute budget for autoresearch loop
budget: "500 steps or 1M tokens"

# Domain knowledge for hypothesis generation
notes: |
  Add any domain knowledge here. What structure do you suspect is missing?
  What analogs exist in nearby solved problems?
